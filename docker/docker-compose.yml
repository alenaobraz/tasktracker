services:
  php-fpm:
    image: alenaobraz/php:8.5-fpm-alpine
    env_file: .env
    volumes:
      - ../backend:/opt/backend
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tasktracker

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ../backend:/opt/backend
      - ./config/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm
    networks:
      - tasktracker

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tasktracker}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-tasktracker}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tasktracker

volumes:
  postgres_data:

networks:
  tasktracker:
    driver: bridge